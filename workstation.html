<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8" />
  <title>Addy Workstation</title>
  <style>
    :root{
      --bg: #1f2550;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.8);
      --shadow: 0 10px 28px rgba(0,0,0,0.18);
      --letters: #5e35b1;
      --numbers: #fb8c00;
      --name: #607d8b;
      --shapes: #26a69a;
      --patterns: #ec407a;
      --challenges: #42a5f5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #243067 0%, #1f2550 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Top badges */
    .badge {
      position: fixed;
      top: 18px;
      z-index: 50;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 22px;
      padding: 10px 16px 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.16), inset 0 0 0 1px rgba(255,255,255,0.14);
      text-align: center;
      user-select: none;
    }

    .clock-badge { right: 18px; min-width: 110px; }
    .progress-badge { left: 18px; min-width: 150px; }

    .badge-big {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .badge-sub {
      margin-top: 4px;
      font-size: clamp(11px, 1.8vw, 14px);
      opacity: 0.9;
      font-weight: 700;
      text-transform: lowercase;
    }

    .screen {
      width: min(1100px, 96vw);
      min-height: min(760px, 92vh);
      background: rgba(255,255,255,0.08);
      border-radius: 32px;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.10);
      padding: 28px;
      display: none;
    }
    .screen.active { display: block; }

    .home-wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .home-title {
      font-size: clamp(34px, 6vw, 64px);
      font-weight: 900;
      letter-spacing: 0.01em;
      margin-bottom: 10px;
    }

    .home-sub {
      font-size: clamp(18px, 2.8vw, 28px);
      color: var(--muted);
      margin-bottom: 30px;
    }

    button {
      border: none;
      border-radius: 22px;
      padding: 0.85em 1.25em;
      font-size: clamp(18px, 2.8vw, 28px);
      font-weight: 900;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.18), inset 0 0 0 2px rgba(255,255,255,0.12);
      transition: transform 0.12s ease;
      user-select: none;
    }
    button:active { transform: scale(0.97); }

    .btn-back { background: rgba(255,255,255,0.18); font-size: 18px; padding: 0.7em 1em; border-radius: 16px; }
    .btn-letters { background: var(--letters); }
    .btn-numbers { background: var(--numbers); }
    .btn-name { background: var(--name); }
    .btn-shapes { background: var(--shapes); }
    .btn-patterns { background: var(--patterns); margin-bottom:12px; }
    .btn-challenges { background: var(--challenges); }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 900;
    }

    .menu-grid {
      width: min(760px, 100%);
      margin: 10px auto 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .menu-grid button {
      width: 100%;
      aspect-ratio: 2 / 1;
      font-size: clamp(20px, 3.5vw, 32px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .activity-shell {
      display: grid;
      grid-template-columns: 260px 1fr 220px;
      gap: 24px;
      align-items: center;
      margin-top: 18px;
    }

    .left-card, .right-card {
      min-height: 220px;
      border-radius: 26px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(255,255,255,0.12);
    }

    .center-card {
      min-height: 420px;
      border-radius: 28px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(255,255,255,0.12);
    }

    .big-pair {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .big-upper {
      font-size: 130px;
      font-weight: 900;
      line-height: 1;
      opacity: 0.55;
    }

    .big-lower {
      font-size: 92px;
      font-weight: 900;
      line-height: 1;
      opacity: 0.55;
    }

    .active-choice { opacity: 1 !important; transform: scale(1.05); }

    .emoji-big { font-size: 98px; line-height: 1.05; }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      justify-items: center;
      align-items: center;
      font-size: 48px;
      line-height: 1;
    }

    .number-emoji-cell {
      width: 1.1em;
      height: 1.1em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name-word {
      font-size: 44px;
      font-weight: 900;
      white-space: nowrap;
    }

    .name-char {
      opacity: 0.6;
      color: rgba(255,255,255,0.84);
      display: inline-block;
    }

    .name-char.done { opacity: 1; color: #ffd54f; }
    .name-char.current { opacity: 1; color: #ffffff; transform: scale(1.07); }

    .shape-label {
      font-size: 44px;
      font-weight: 900;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .shape-preview {
      width: 260px;
      height: 260px;
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.14);
      position: relative;
    }

    .canvas-wrap {
      position: relative;
      width: 340px;
      height: 340px;
    }

    canvas { border-radius: 24px; }

    .draw-layer {
      position: absolute;
      left: 0; top: 0;
      touch-action: none;
    }

    .sub-actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-soft {
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 18px;
      padding: 0.7em 1em;
      border-radius: 16px;
      font-weight: 900;
    }

    /* Patterns */
    .pattern-strip {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      font-size: 56px;
    }

    .pattern-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: min(520px, 100%);
      margin-top: 18px;
    }

    .pattern-option {
      background: rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 20px;
      font-size: 56px;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10);
      user-select: none;
      text-align: center;
      font-weight: 900;
    }

    .feedback {
      margin-top: 14px;
      min-height: 1.4em;
      font-weight: 900;
      color: #ffd8e5;
      text-align: center;
      font-size: 22px;
    }

    /* Challenges */
    .challenge-card {
      width: min(680px, 100%);
      min-height: 220px;
      background: rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 24px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 900;
      line-height: 1.25;
    }

    /* Reward overlay */
    .reward-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      background: rgba(8, 10, 24, 0.55);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      padding: 18px;
    }

    .reward-overlay.active { display: flex; }

    .reward-card {
      width: min(560px, 94vw);
      border-radius: 30px;
      background: rgba(255,255,255,0.14);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,255,255,0.12);
      padding: 22px 20px 18px;
      text-align: center;
      color: white;
    }

    .reward-emoji {
      font-size: 96px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .reward-title {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .reward-sub {
      font-size: 18px;
      opacity: 0.9;
      font-weight: 800;
      margin-bottom: 14px;
    }

    @media (max-width: 900px) {
      .activity-shell { grid-template-columns: 1fr; }
      .shape-preview { width: 220px; height: 220px; }
    }
  </style>
</head>

  <script>

/***************
 * Analytics + Progress (localStorage)
 ***************/
const STORE = {
  eventsKey: "addy_ws_events_v1",
  progressKey: "addy_ws_progress_v1"
};

document.getElementById("btnShop").onclick = () => {
  window.location.href = "shop.html";
};

function nowISO() { return new Date().toISOString(); }

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function saveJSON(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function logEvent(type, data = {}) {
  const events = loadJSON(STORE.eventsKey, []);
  events.push({ t: nowISO(), type, ...data });
  if (events.length > 3000) events.splice(0, events.length - 3000);
  saveJSON(STORE.eventsKey, events);
}

function todayKey(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function getProgress() {
  return loadJSON(STORE.progressKey, {
    stars: 0,
    byModeStars: { letters: 0, numbers: 0, name: 0, shapes: 0, patterns: 0, challenges: 0 },
    byModeSuccess: { letters: 0, numbers: 0, name: 0, shapes: 0, patterns: 0, challenges: 0 },
    byModeRewards: { letters: 0, numbers: 0, name: 0, shapes: 0, patterns: 0, challenges: 0 },
    lastStarDay: null,
    streakDays: 0
  });
}

function renderProgress() {
  const p = getProgress();
  document.getElementById("starsCount").textContent = `⭐ ${p.stars}`;
  document.getElementById("streakLabel").textContent = `streak: ${p.streakDays} days`;
}

function setProgress(p) {
  saveJSON(STORE.progressKey, p);
  renderProgress();
}

function addStar(mode) {
  const p = getProgress();
  p.stars += 1;
  if (p.byModeStars[mode] !== undefined) p.byModeStars[mode] += 1;

  const today = todayKey();
  if (p.lastStarDay !== today) {
    if (p.lastStarDay) {
      const last = new Date(p.lastStarDay + "T00:00:00");
      const td = new Date(today + "T00:00:00");
      const diffDays = Math.round((td - last) / (1000 * 60 * 60 * 24));
      p.streakDays = (diffDays === 1) ? (p.streakDays + 1) : 1;
    } else {
      p.streakDays = 1;
    }
    p.lastStarDay = today;
  }

  setProgress(p);
  logEvent("star_awarded", { mode });
}

/***************
 * Reward overlay
 ***************/
function showRewardOverlay({ emoji, title, sub }) {
  const overlay = document.getElementById("rewardOverlay");
  document.getElementById("rewardEmoji").textContent = emoji;
  document.getElementById("rewardTitle").textContent = title;
  document.getElementById("rewardSub").textContent = sub;
  overlay.classList.add("active");
  overlay.setAttribute("aria-hidden", "false");
}

function hideRewardOverlay() {
  const overlay = document.getElementById("rewardOverlay");
  overlay.classList.remove("active");
  overlay.setAttribute("aria-hidden", "true");
}

document.getElementById("rewardClose").onclick = hideRewardOverlay;
document.getElementById("rewardOverlay").onclick = (e) => {
  if (e.target.id === "rewardOverlay") hideRewardOverlay();
};

function awardSuccess(mode) {
  const p = getProgress();

  // Count the success, but do NOT award a star yet.
  p.byModeSuccess[mode] = (p.byModeSuccess[mode] || 0) + 1;
  const n = p.byModeSuccess[mode];

  saveJSON(STORE.progressKey, p);
  renderProgress();
  logEvent("success_recorded", { mode, successCount: n });

  // Only award a star on every 5th success
  if (n % 5 === 0) {
    addStar(mode);

    showRewardOverlay({
      emoji: "⭐",
      title: "You got a star!",

/***************
 * Drawing overlay helpers
 ***************/
function wireDrawing(drawCanvas, colorGetter) {
  const ctx = drawCanvas.getContext("2d");
  let drawing = false;
  let lastX = 0, lastY = 0;

  function getXY(e) {
    const rect = drawCanvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
      return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
    }
    return [e.clientX - rect.left, e.clientY - rect.top];
  }

  function start(e) {
    drawing = true;
    [lastX, lastY] = getXY(e);
    logEvent("draw_start", { canvas: drawCanvas.id });
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const [x, y] = getXY(e);
    ctx.save();
    ctx.lineWidth = 18;
    ctx.lineCap = "round";
    ctx.strokeStyle = colorGetter();
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.restore();
    [lastX, lastY] = [x, y];
  }

  function end() { drawing = false; }

  drawCanvas.addEventListener("mousedown", start);
  drawCanvas.addEventListener("mousemove", move);
  drawCanvas.addEventListener("mouseup", end);
  drawCanvas.addEventListener("mouseout", end);

  drawCanvas.addEventListener("touchstart", start, { passive: false });
  drawCanvas.addEventListener("touchmove", move, { passive: false });
  drawCanvas.addEventListener("touchend", end);
  drawCanvas.addEventListener("touchcancel", end);

  return {
    clear: () => ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height),
  };
}

function drawGuideText(canvas, text, font, color) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.18;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = font;
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  ctx.restore();
}

function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function flashFeedback(el, text, ms = 900) {
  el.textContent = text;
  setTimeout(() => { el.textContent = ""; }, ms);
}

/***************
 * Trace checking (lenient-aware)
 ***************/
function isUserStrokePixel(imageData, idx) {
  const a = imageData.data[idx + 3];
  return a > 20;
}

function buildTextMask(text, font) {
  const temp = document.createElement("canvas");
  temp.width = 340; temp.height = 340;
  const tctx = temp.getContext("2d");
  tctx.clearRect(0, 0, temp.width, temp.height);
  tctx.fillStyle = "#000";
  tctx.textAlign = "center";
  tctx.textBaseline = "middle";
  tctx.font = font;
  tctx.fillText(text, temp.width / 2, temp.height / 2);
  return tctx.getImageData(0, 0, temp.width, temp.height);
}

function checkMatchAgainstMask(drawCanvas, maskImageData, kind) {
  const ctx = drawCanvas.getContext("2d");
  const userImage = ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);

  let targetPixels = 0;
  let coveredTargetPixels = 0;
  let totalUserStrokePixels = 0;
  let offTargetStrokePixels = 0;

  for (let y = 0; y < drawCanvas.height; y++) {
    for (let x = 0; x < drawCanvas.width; x++) {
      const idx = (y * drawCanvas.width + x) * 4;

      const isTarget =
        maskImageData.data[idx] < 128 &&
        maskImageData.data[idx + 3] > 128;

      const isUserStroke = isUserStrokePixel(userImage, idx);

      if (isTarget) {
        targetPixels++;
        if (isUserStroke) coveredTargetPixels++;
      }

      if (isUserStroke) {
        totalUserStrokePixels++;
        if (!isTarget) offTargetStrokePixels++;
      }
    }
  }

  const coverage = targetPixels > 0 ? coveredTargetPixels / targetPixels : 0;
  const onTargetRatio = totalUserStrokePixels > 0
    ? coveredTargetPixels / totalUserStrokePixels
    : 0;

  const { lenient } = getSettings();

  const T = {
    shapes: lenient
      ? { minStroke: 650, minCoverage: 0.16, minOnTarget: 0.12 }
      : { minStroke: 900, minCoverage: 0.22, minOnTarget: 0.18 },
    text: lenient
      ? { minStroke: 850, minCoverage: 0.26, minOnTarget: 0.62, maxOffFrac: 0.40 }
      : { minStroke: 1200, minCoverage: 0.35, minOnTarget: 0.72, maxOffFrac: 0.28 },
  };

  if (kind === "shapes") {
    return (
      totalUserStrokePixels > T.shapes.minStroke &&
      coverage > T.shapes.minCoverage &&
      onTargetRatio > T.shapes.minOnTarget
    );
  }

  return (
    totalUserStrokePixels > T.text.minStroke &&
    coverage > T.text.minCoverage &&
    onTargetRatio > T.text.minOnTarget &&
    offTargetStrokePixels < totalUserStrokePixels * T.text.maxOffFrac
  );
}

/***************
 * Shapes
 ***************/
const SHAPES = ["circle", "square", "triangle", "heart", "star"];
let currentShape = "circle";
const shapesFeedback = document.getElementById("shapesFeedback");

const shapesDraw = wireDrawing(document.getElementById("shapesDraw"), () => "#26a69a");

function drawHeart(ctx, x, y, size) {
  ctx.beginPath();
  const topCurveHeight = size * 0.3;
  ctx.moveTo(x, y + topCurveHeight);
  ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + topCurveHeight);
  ctx.bezierCurveTo(x - size / 2, y + (size + topCurveHeight) / 2, x, y + (size + topCurveHeight) / 2, x, y + size);
  ctx.bezierCurveTo(x, y + (size + topCurveHeight) / 2, x + size / 2, y + (size + topCurveHeight) / 2, x + size / 2, y + topCurveHeight);
  ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + topCurveHeight);
}

function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
  let rot = Math.PI / 2 * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerRadius);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerRadius);
  ctx.closePath();
}

function drawShape(canvas, shape, color, alpha = 0.18, lineWidth = 18) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  if (shape === "circle") {
    ctx.beginPath();
    ctx.arc(cx, cy, 95, 0, Math.PI * 2);
    ctx.stroke();
  } else if (shape === "square") {
    ctx.strokeRect(cx - 95, cy - 95, 190, 190);
  } else if (shape === "triangle") {
    ctx.beginPath();
    ctx.moveTo(cx, cy - 110);
    ctx.lineTo(cx - 110, cy + 95);
    ctx.lineTo(cx + 110, cy + 95);
    ctx.closePath();
    ctx.stroke();
  } else if (shape === "heart") {
    drawHeart(ctx, cx, cy - 70, 180);
    ctx.stroke();
  } else if (shape === "star") {
    drawStar(ctx, cx, cy, 5, 110, 48);
    ctx.stroke();
  }

  ctx.restore();
}

function buildShapeMask(shape) {
  const temp = document.createElement("canvas");
  temp.width = 340; temp.height = 340;
  drawShape(temp, shape, "#000", 1.0, 18);
  return temp.getContext("2d").getImageData(0, 0, 340, 340);
}

function newShape() {
  let next = randomItem(SHAPES);
  while (next === currentShape && SHAPES.length > 1) next = randomItem(SHAPES);
  currentShape = next;

  document.getElementById("shapeLabel").textContent =
    currentShape.charAt(0).toUpperCase() + currentShape.slice(1);

  drawShape(document.getElementById("shapesGuide"), currentShape, "#26a69a", 0.18, 18);
  drawShape(document.getElementById("shapesPreview"), currentShape, "#26a69a", 1, 14);

  shapesDraw.clear();
  logEvent("new_item", { mode: "shapes", shape: currentShape });
}

document.getElementById("shapesClear").onclick = () => { shapesDraw.clear(); logEvent("clear_canvas", { mode: "shapes" }); };

  const mask = buildShapeMask(currentShape);
  const passed = checkMatchAgainstMask(document.getElementById("shapesDraw"), mask, "shapes");
  logEvent("done_pressed", { mode: "shapes", passed, shape: currentShape });

  if (passed) {
    flashFeedback(shapesFeedback, "Great! ⭐");
    awardSuccess("shapes");
    setTimeout(() => newShape(), 650);
  } else {
    flashFeedback(shapesFeedback, "Try again!");
    shapesDraw.clear();
  }
};

/***************
 * Patterns
 ***************/
const PATTERN_SETS = [
  { seq: ["⬛", "⬜", "⬛", "⬜"], answer: "⬛", wrong: ["⬜", "🟦", "⭐"] },
  { seq: ["🔵", "🔴", "🔵", "🔴"], answer: "🔵", wrong: ["🔴", "🟢", "🟡"] },
  { seq: ["⭐", "🌙", "⭐", "🌙"], answer: "⭐", wrong: ["🌙", "☀️", "☁️"] },
  { seq: ["🟩", "🟨", "🟩", "🟨"], answer: "🟩", wrong: ["🟨", "🟦", "🟥"] }
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function newPattern() {
  const p = randomItem(PATTERN_SETS);
  const strip = document.getElementById("patternStrip");
  const options = document.getElementById("patternOptions");
  const feedback = document.getElementById("patternFeedback");

  feedback.textContent = "";
  strip.innerHTML = p.seq.map(x => `<span>${x}</span>`).join("") + `<span> ?</span>`;

  const choices = shuffle([p.answer, ...p.wrong.slice(0, 3)]);
  options.innerHTML = "";

  logEvent("new_item", { mode: "patterns", seq: p.seq });

  choices.forEach(choice => {
    const d = document.createElement("div");
    d.className = "pattern-option";
    d.textContent = choice;
    d.onclick = () => {
      logEvent("pattern_choice", { choice, correct: choice === p.answer });
      if (choice === p.answer) {
        feedback.textContent = "Nice pattern! ⭐";
        awardSuccess("patterns");
        setTimeout(() => newPattern(), 650);
      } else {
        feedback.textContent = "Try another one.";
      }
    };
    options.appendChild(d);
  });
}

document.getElementById("btnPatterns").onclick = () => { newPattern(); showScreen("patterns"); };
document.getElementById("newPattern").onclick = newPattern;
