<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Addy Workstation</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d1b69">
  <link rel="apple-touch-icon" href="icons/app_1.png">

  <!-- GOOD FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/theme.css" />
</head>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
  });
}
</script>

<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="home-wrap">
    <div class="home-title">Addy Workstation</div>
    <div class="home-sub">Pick an activity ✨</div>

    <button class="btn-patterns" id="goMenu">✏️ Learning</button>
    <button class="btn-patterns" id="btnColoring">🎨 Coloring</button>
    <button class="btn-patterns" id="openSettings">⚙️ Settings</button>
  </div>
</div>

<!-- MENU -->
<div class="screen" id="menuScreen">
  <div class="top-row">
    <div class="section-title">Learning Menu</div>
    <button class="btn-back" id="menuBackBtn">Back</button>
  </div>

  <div class="menu-grid">

    <button class="btn-letters" id="btnLetters">
      <span class="btn-emoji">🔤</span> Letters
    </button>

    <button class="btn-numbers" id="btnNumbers">
      <span class="btn-emoji">🔢</span> Numbers
    </button>

    <button class="btn-name" id="btnName">
      <span class="btn-emoji">✍️</span> Name
    </button>

    <button class="btn-patterns" id="btnReading">
      <span class="btn-emoji">📖</span> Reading
    </button>

    <button class="btn-shapes" id="btnShapes">
      <span class="btn-emoji">🔶</span> Shapes
    </button>

    <button class="btn-patterns" id="btnPatterns">
      <span class="btn-emoji">🧩</span> Patterns
    </button>

    <button class="btn-challenges" id="btnChallenges">
      <span class="btn-emoji">💪</span> Challenge Cards
    </button>

  </div>
</div>

<!-- LETTERS -->
<div class="screen" id="lettersScreen">
  <div class="top-row">
    <div class="section-title">Letters</div>
    <button class="btn-back backToMenu">Back</button>
  </div>

  <div class="activity-shell">
    <div class="left-card">
      <div id="lettersUpper"></div>
      <div id="lettersLower"></div>
    </div>

    <div class="center-card">
      <canvas id="lettersGuide" width="340" height="340"></canvas>
      <canvas id="lettersDraw" width="340" height="340"></canvas>
      <button id="lettersDone">Done ⭐</button>
      <div id="lettersFeedback"></div>
    </div>

    <div class="right-card">
      <div id="lettersEmoji"></div>
    </div>
  </div>
</div>

<!-- NUMBERS -->
<div class="screen" id="numbersScreen">
  <div class="top-row">
    <div class="section-title">Numbers</div>
    <button class="btn-back backToMenu">Back</button>
  </div>

  <div class="activity-shell">
    <div class="left-card">
      <div id="numbersValue"></div>
    </div>

    <div class="center-card">
      <canvas id="numbersGuide" width="340" height="340"></canvas>
      <canvas id="numbersDraw" width="340" height="340"></canvas>
      <button id="numbersDone">Done ⭐</button>
      <div id="numbersFeedback"></div>
    </div>

    <div class="right-card">
      <div id="numbersGrid"></div>
    </div>
  </div>
</div>

<!-- NAME -->
<div class="screen" id="nameScreen">
  <div class="top-row">
    <div class="section-title">Name</div>
    <button class="btn-back backToMenu">Back</button>
  </div>

  <div class="activity-shell">
    <div id="nameWord"></div>

    <canvas id="nameGuide" width="340" height="340"></canvas>
    <canvas id="nameDraw" width="340" height="340"></canvas>

    <button id="nameDone">Done ⭐</button>
    <div id="nameFeedback"></div>
  </div>
</div>

<!-- SHAPES -->
<div class="screen" id="shapesScreen">
  <div class="top-row">
    <div class="section-title">Shapes</div>
    <button class="btn-back backToMenu">Back</button>
  </div>
</div>

<!-- PATTERNS -->
<div class="screen" id="patternsScreen">
  <div class="top-row">
    <div class="section-title">Patterns</div>
    <button class="btn-back backToMenu">Back</button>
  </div>
</div>

<!-- CHALLENGES -->
<div class="screen" id="challengesScreen">
  <div class="top-row">
    <div class="section-title">Challenge Cards</div>
    <button class="btn-back backToMenu">Back</button>
  </div>

  <div class="center-card">
    <div id="challengeCard"></div>
    <button id="newChallenge">New</button>
    <button id="challengeDone">Check ⭐</button>
    <div id="challengeFeedback"></div>
  </div>
</div>

<!-- READING -->
<div class="screen" id="readingScreen">
  <div class="top-row">
    <div class="section-title">Reading</div>
    <button class="btn-back backToMenu">Back</button>
  </div>

  <div class="center-card">
    <div id="readingCard"></div>
    <button id="newReading">New</button>
    <button id="readingDone">Check ⭐</button>
    <div id="readingFeedback"></div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="js/storage.js"></script>
<script src="js/router.js"></script>
<script src="js/ui.js"></script>
<script src="js/analytics.js"></script>
<script src="js/rewards.js"></script>
<script src="js/settings.js"></script>
<script src="js/workstation.js"></script>
<script src="js/boot.js"></script>

</body>
</html>
