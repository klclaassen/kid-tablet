<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Addy Workstation</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d1b69">
  <link rel="apple-touch-icon" href="icons/app_1.png">

  <link rel="stylesheet" href="css/theme.css" />

<style>
  html,
  body{
    margin:0;
    min-height:100%;
    height:auto;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  body{
    display:block;
    padding:24px;
  }

  .analyticsWrap{
    width:min(1100px, 96vw);
    margin:0 auto;
    padding-bottom:24px;
  }

  .analyticsCard{
    background:rgba(255,255,255,0.10);
    border-radius:18px;
    padding:16px;
    margin-bottom:14px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }

  .muted{
    opacity:0.85;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  table{
    width:100%;
    border-collapse:collapse;
  }

  td, th{
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.12);
    text-align:left;
  }

  pre{
    white-space:pre-wrap;
    word-break:break-word;
    background:rgba(0,0,0,0.25);
    padding:12px;
    border-radius:12px;
    overflow-x:auto;
  }

  .btn-danger{
    background:#d32f2f;
    color:#fff;
  }
</style>

</head>
<body>
  <div class="analyticsWrap">
    <div class="top-row">
      <div class="section-title">Workstation Analytics</div>
      <button class="btn-back" id="backBtn">Back</button>
    </div>

    <div class="analyticsCard">
      <div id="time"></div>
    </div>

    <div class="analyticsCard">
      <div id="accuracy"></div>
    </div>

    <div class="analyticsCard">
      <div id="summary"></div>
    </div>

    <div class="analyticsCard">
      <h2 style="margin:0 0 10px; font-size:18px;">Stars by Mode</h2>
      <div id="byMode"></div>
    </div>

    <div class="analyticsCard">
      <h2 style="margin:0 0 10px; font-size:18px;">Recent Events</h2>
      <div class="muted" style="margin-bottom:8px;">Most recent 25</div>
      <pre id="events"></pre>
    </div>

    <div class="analyticsCard">
      <div class="row">
        <button class="btn-soft" id="refresh">Refresh</button>
        <button class="btn-soft" id="export">Export JSON</button>
        <button class="btn-danger" id="reset">Reset ALL (events + progress)</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/boot.js"></script>

  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js")
        .catch(err => console.error("Service worker registration failed:", err));
    });
  }
</script>
  <script>
function renderBar(label, value, max) {
  const pct = max > 0 ? (value / max) * 100 : 0;

  return `
    <div style="margin-bottom:8px;">
      <div>${label} — ${value}</div>
      <div style="background:rgba(255,255,255,0.12); border-radius:10px;">
        <div style="
          width:${pct}%;
          height:12px;
          background:#42a5f5;
          border-radius:10px;
        "></div>
      </div>
    </div>
  `;
}

function renderAnalyticsPage() {
  const p = getProgress();
  const events = getEvents();
  const stats = computeAnalytics();
  const skills = getSkills();

  document.getElementById("summary").innerHTML = `
    <div style="font-size:22px; font-weight:900;">⭐ Stars: ${p.stars}</div>
    <div class="muted">Streak: ${p.streakDays} days</div>

    <div style="margin-top:12px;">
      📖 Reading level: ${skills.reading?.level ?? 1}<br>
      💪 Challenges level: ${skills.challenges?.level ?? 1}<br>
      🔶 Shapes level: ${skills.shapes?.level ?? 1}<br>
      🧩 Patterns level: ${skills.patterns?.level ?? 1}
    </div>
  `;

  /***************
   * TIME
   ***************/
  const maxTime = Math.max(...Object.values(stats.timeByMode || {}), 1);

  let timeHTML = `<h2 style="font-size:18px;">Time Spent</h2>`;

  Object.entries(stats.timeByMode).forEach(([mode, ms]) => {
    timeHTML += renderBar(mode, formatTime(ms), maxTime);
  });

  document.getElementById("time").innerHTML = timeHTML;

  /***************
   * ACCURACY
   ***************/
  let accHTML = `<h2 style="font-size:18px;">Accuracy %</h2>`;

  Object.entries(stats.accuracyByMode).forEach(([mode, pct]) => {
    accHTML += renderBar(mode, pct + "%", 100);
  });

  document.getElementById("accuracy").innerHTML = accHTML;

  /***************
   * STARS
   ***************/
  const rows = Object.entries(p.byModeStars || {})
    .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`)
    .join("");

  document.getElementById("byMode").innerHTML =
    `<table><tr><th>Mode</th><th>Stars</th></tr>${rows}</table>`;
}

document.getElementById("backBtn").onclick = () => {
  location.href = "index.html";
};

document.getElementById("refresh").onclick = renderAnalyticsPage;

renderAnalyticsPage();
</script>
</body>
</html>
