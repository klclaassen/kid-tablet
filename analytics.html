<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8" />
  <title>Workstation Analytics</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 18px; background:#0f1535; color:#fff; }
    .card { background: rgba(255,255,255,0.10); border-radius: 18px; padding: 16px; margin-bottom: 14px; }
    h1 { margin: 0 0 12px; font-size: 22px; }
    button { border: 0; border-radius: 12px; padding: 10px 12px; font-weight: 800; cursor: pointer; }
    .row { display:flex; gap:10px; flex-wrap: wrap; }
    .btn { background: rgba(255,255,255,0.18); color:#fff; }
    .btn-danger { background: #d32f2f; color:#fff; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.12); text-align: left; }
    .muted { opacity: 0.85; }
    pre { white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Workstation Analytics</h1>

  <div class="card">
    <div id="summary"></div>
  </div>

  <div class="card">
    <h2 style="margin:0 0 10px; font-size:18px;">Stars by Mode</h2>
    <div id="byMode"></div>
  </div>

  <div class="card">
    <h2 style="margin:0 0 10px; font-size:18px;">Recent Events</h2>
    <div class="muted" style="margin-bottom:8px;">Most recent 25</div>
    <pre id="events"></pre>
  </div>

  <div class="card">
    <div class="row">
      <button class="btn" id="refresh">Refresh</button>
      <button class="btn" id="export">Export JSON</button>
      <button class="btn-danger" id="reset">Reset ALL (events + progress)</button>
    </div>
  </div>

  <script>
    const STORE = {
      eventsKey: "addy_ws_events_v1",
      progressKey: "addy_ws_progress_v1"
    };

    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function render() {
      const p = loadJSON(STORE.progressKey, null) || {
        stars: 0, streakDays: 0, lastStarDay: null,
        byMode: { letters: 0, numbers: 0, name: 0, shapes: 0, patterns: 0, challenges: 0 }
      };
      const events = loadJSON(STORE.eventsKey, []);

      document.getElementById("summary").innerHTML = `
        <div style="font-size:20px; font-weight:900;">⭐ Stars: ${p.stars}</div>
        <div class="muted">Streak: ${p.streakDays} days</div>
        <div class="muted">Last star day: ${p.lastStarDay || "—"}</div>
        <div class="muted">Total events stored: ${events.length}</div>
      `;

      const rows = Object.entries(p.byMode || {}).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
      document.getElementById("byMode").innerHTML = `<table><tr><th>Mode</th><th>Stars</th></tr>${rows}</table>`;

      const recent = events.slice(-25).reverse();
      document.getElementById("events").textContent = recent.map(e => JSON.stringify(e)).join("\n");
    }

    document.getElementById("refresh").onclick = render;

    document.getElementById("export").onclick = () => {
      const payload = {
        exportedAt: new Date().toISOString(),
        progress: loadJSON(STORE.progressKey, {}),
        events: loadJSON(STORE.eventsKey, [])
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "workstation_analytics_export.json";
      a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById("reset").onclick = () => {
      if (!confirm("This deletes ALL stored events and progress. Continue?")) return;
      localStorage.removeItem(STORE.eventsKey);
      localStorage.removeItem(STORE.progressKey);
      render();
    };

    render();
  </script>
</body>
</html>
