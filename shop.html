<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8" />
  <title>Star Shop</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0f1535; color:#fff; padding:18px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
    .card { background: rgba(255,255,255,0.10); border-radius: 18px; padding: 14px; margin-bottom: 12px; }
    .btn { border:0; border-radius:14px; padding:10px 12px; font-weight:900; cursor:pointer; background: rgba(255,255,255,0.18); color:#fff; }
    .btn-primary { background:#ffd54f; color:#222; }
    .btn-disabled { opacity:0.6; cursor:not-allowed; }
    .title { font-size: 22px; font-weight: 900; }
    .sub { opacity: 0.9; font-weight: 800; margin-top: 4px; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .stars { font-size: 20px; font-weight: 900; }

    .items {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap:12px;
    }

    .itemCard {
      background: rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .thumb {
      width:100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow:hidden;
      background: rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:10px;
    }
    .thumb img {
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }

    .itemName {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .pill {
      display:inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 12px;
      background: rgba(255,255,255,0.12);
      margin-top: 6px;
    }

    .pill-owned { background: rgba(255, 213, 79, 0.22); color:#ffd54f; }
    .pill-locked { opacity: 0.9; }

    .small { font-size: 12px; opacity: 0.9; font-weight: 800; }
  </style>
</head>
<body>
  <div class="top">
    <div class="title">⭐ Star Shop</div>
    <button class="btn" id="backBtn">Back</button>
  </div>

  <div class="card">
    <div class="stars">You have <span id="stars">0</span> ⭐</div>
    <div class="sub">Buy fun coloring pages with stars!</div>
    <div class="row" style="margin-top:12px;">
      <button class="btn" id="myPagesBtn">My Coloring Pages</button>
    </div>
  </div>

  <div class="items" id="items"></div>

  <script>
    // MUST match workstation
    const PROGRESS_KEY = "addy_ws_progress_v1";
    const SHOP_KEY = "addy_ws_shop_v1";

    // IMPORTANT: these IDs should match coloring_pages.html PAGES[].id
    const ITEMS = [
    { id: "page_boy1", name: "Coloring: Boy", cost: 3, img:"pages/boy1.png" },
    { id: "page_dino1", name: "Coloring: Dinosaur", cost: 3, img:"pages/dino1.png" },
    { id: "page_icecreamtruck", name: "Coloring: Ice Cream Truck", cost: 3, img:"pages/icecreamtruck.png" },
    { id: "page_octopus", name: "Coloring: Octopus", cost: 3, img:"pages/octopus.png" },
    { id: "page_truck1", name: "Coloring: Truck", cost: 3, img:"pages/truck1.png" },
    { id: "page_turtle", name: "Coloring: Turtle", cost: 3, img:"pages/turtle.png" }
  ];

    function loadJSON(key, fallback) {
      try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
      catch { return fallback; }
    }
    function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    function getStars() {
      const p = loadJSON(PROGRESS_KEY, { stars: 0 });
      return Number(p.stars || 0);
    }
    function setStars(n) {
      const p = loadJSON(PROGRESS_KEY, { stars: 0 });
      p.stars = Math.max(0, Number(n || 0));
      saveJSON(PROGRESS_KEY, p);
    }

    function getShop() {
      return loadJSON(SHOP_KEY, { purchased: {} });
    }
    function setShop(s) { saveJSON(SHOP_KEY, s); }
    function isBought(id) { return !!getShop().purchased[id]; }

    function spend(cost) {
      const stars = getStars();
      if (stars < cost) return false;
      setStars(stars - cost);
      return true;
    }

    function buy(id, cost) {
      if (!spend(cost)) return false;
      const s = getShop();
      s.purchased[id] = { at: new Date().toISOString() };
      setShop(s);
      return true;
    }

    function gotoMyPages(openId = null) {
      // If you add the optional auto-open snippet in coloring_pages.html,
      // this will open directly into the chosen page.
      const url = openId ? `coloring_pages.html?open=${encodeURIComponent(openId)}` : "coloring_pages.html";
      location.href = url;
    }

    function render() {
      const stars = getStars();
      document.getElementById("stars").textContent = stars;

      const wrap = document.getElementById("items");
      wrap.innerHTML = "";

      ITEMS.forEach(item => {
        const bought = isBought(item.id);

        const card = document.createElement("div");
        card.className = "itemCard";

        const thumb = document.createElement("div");
        thumb.className = "thumb";
        const img = document.createElement("img");
        img.src = item.img;
        img.alt = item.name;
        thumb.appendChild(img);

        const name = document.createElement("div");
        name.className = "itemName";
        name.textContent = item.name;

        const small = document.createElement("div");
        small.className = "small";
        small.textContent = `Cost: ${item.cost} ⭐`;

        const pill = document.createElement("div");
        pill.className = "pill " + (bought ? "pill-owned" : "pill-locked");
        pill.textContent = bought ? "⭐ Purchased" : "🔒 Locked";

        const row = document.createElement("div");
        row.className = "row";

        const btn = document.createElement("button");
        btn.className = "btn";

        if (bought) {
          btn.classList.add("btn-primary");
          btn.textContent = "Open";
          btn.onclick = () => gotoMyPages(item.id);
        } else if (stars >= item.cost) {
          btn.classList.add("btn-primary");
          btn.textContent = "Buy";
          btn.onclick = () => {
            if (buy(item.id, item.cost)) render();
          };
        } else {
          const need = item.cost - stars;
          btn.classList.add("btn-disabled");
          btn.textContent = `Need ${need} ⭐`;
          btn.disabled = true;
        }

        row.appendChild(btn);

        card.appendChild(thumb);
        card.appendChild(name);
        card.appendChild(small);
        card.appendChild(pill);
        card.appendChild(row);
        wrap.appendChild(card);
      });
    }

    document.getElementById("backBtn").onclick = () => location.href = "workstation.html";
    document.getElementById("myPagesBtn").onclick = () => gotoMyPages();

    render();
  </script>
</body>
</html>
